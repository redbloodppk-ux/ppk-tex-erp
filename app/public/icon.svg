<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="PPK TEX">
  <!-- Full-bleed brand navy. iOS / Android apply their own corner mask, so we
       paint edge-to-edge and keep the monogram inside the safe centre. -->
  <rect width="100" height="100" fill="#1F2057"/>
  <!-- Subtle woven warp texture behind the monogram. -->
  <g stroke="#E8B040" stroke-width="1.4" opacity="0.12">
    <line x1="22" y1="8" x2="22" y2="92"/>
    <line x1="32" y1="8" x2="32" y2="92"/>
    <line x1="68" y1="8" x2="68" y2="92"/>
    <line x1="78" y1="8" x2="78" y2="92"/>
  </g>
  <!-- PT monogram, scaled up and centred to fill ~70% of the canvas. -->
  <g transform="translate(50,50) scale(1.15) translate(-56,-58)">
    <path d="M 28 30 L 28 84 M 28 30 L 52 30 Q 70 30 70 44 Q 70 58 52 58 L 28 58"
          stroke="#ffffff" stroke-width="9" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M 42 44 L 84 44 M 64 44 L 64 86"
          stroke="#E8B040" stroke-width="9" fill="none" stroke-linecap="square"/>
  </g>
</svg>
