<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Stylised loom / weave pattern -->
  <g stroke="#ffffff" stroke-width="14" stroke-linecap="round" opacity="0.25">
    <line x1="96"  y1="96"  x2="96"  y2="416"/>
    <line x1="160" y1="96"  x2="160" y2="416"/>
    <line x1="224" y1="96"  x2="224" y2="416"/>
    <line x1="288" y1="96"  x2="288" y2="416"/>
    <line x1="352" y1="96"  x2="352" y2="416"/>
    <line x1="416" y1="96"  x2="416" y2="416"/>
  </g>
  <g stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.35">
    <line x1="80"  y1="160" x2="432" y2="160"/>
    <line x1="80"  y1="224" x2="432" y2="224"/>
    <line x1="80"  y1="288" x2="432" y2="288"/>
    <line x1="80"  y1="352" x2="432" y2="352"/>
  </g>
  <!-- Monogram PT -->
  <g fill="#ffffff" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-weight="800" text-anchor="middle">
    <text x="256" y="298" font-size="180" letter-spacing="-6">PT</text>
  </g>
</svg>
